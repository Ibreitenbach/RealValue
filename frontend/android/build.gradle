// Top-level build file where you can add configuration options common to all sub-projects/modules.
buildscript {
    ext {
        buildToolsVersion = "34.0.0"
        minSdkVersion = 21
        compileSdkVersion = 34
        targetSdkVersion = 34
        ndkVersion = "25.2.9519653" // Added NDK version
        kotlinVersion = "1.8.0"
    }
    repositories {
        google()
        mavenCentral()
    }
    dependencies {
        // Updated Android Gradle Plugin version for compatibility with Gradle 8.14.3
        classpath("com.android.tools.build:gradle:8.4.2") // Updated to 8.4.2
        classpath("org.jetbrains.kotlin:kotlin-gradle-plugin:$kotlinVersion")
    }
}

allprojects {
    repositories {
        // Prioritize local React Native Maven repository
        maven { url "$rootDir/../node_modules/react-native/android" } // Moved to top
        // Add React Native's official Maven repository
        maven { url "https://www.maven.org/snapshots" } // React Native specific Maven URL
        mavenCentral()
        google()
        maven { url 'https://www.jitpack.io' }
        maven { url 'https://oss.sonatype.org/content/repositories/snapshots/' }
    }
}
