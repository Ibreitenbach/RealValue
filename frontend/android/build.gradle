// Top-level build file where you can add configuration options common to all sub-projects/modules.
buildscript {
    ext {
        buildToolsVersion = "34.0.0"
        minSdkVersion = 21
        compileSdkVersion = 34
        targetSdkVersion = 34
        ndkVersion = "25.2.9519653" // Added NDK version
        kotlinVersion = "1.8.0"
    }
    repositories {
        google()
        mavenCentral()
    }
    dependencies {
        // Updated Android Gradle Plugin version for compatibility with Gradle 8.14.3
        classpath("com.android.tools.build:gradle:8.4.2") // Updated to 8.4.2
        classpath("org.jetbrains.kotlin:kotlin-gradle-plugin:$kotlinVersion")
    }
}

allprojects {
    repositories {
        // Prioritize React Native's official Maven repository
        maven { url = "https://maven.pkg.github.com/react-native/maven" } // Corrected syntax
        // Prioritize local React Native Maven repository
        maven { url = "$rootDir/../node_modules/react-native/android" } // Corrected syntax
        mavenCentral()
        google()
        maven { url = 'https://www.jitpack.io' } // Corrected syntax
        maven { url = 'https://oss.sonatype.org/content/repositories/snapshots/' } // Corrected syntax
    }
}
