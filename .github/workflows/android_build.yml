name: Android CI Build

on:
  push:
    branches:
      - main # Trigger on pushes to the main branch
  workflow_dispatch: # Allows manual triggering from the GitHub Actions tab

jobs:
  build:
    runs-on: ubuntu-latest # Use a fresh Ubuntu environment provided by GitHub
    # Add PYTHONPATH here, making the root of the repository discoverable for Python tests
    env:
      PYTHONPATH: ${{ github.workspace }}

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
        cache: 'gradle' # Cache Gradle dependencies for faster builds

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.9' # Specify a Python version compatible with your backend project

    - name: Install Backend Dependencies
      run: |
        cd backend
        pip install -r requirements.txt

    - name: Run Backend Tests
      run: |
        cd backend
        pytest

    - name: Grant execute permission to gradlew
      run: chmod +x frontend/android/gradlew

    - name: Build Debug APK
      run: ./frontend/android/gradlew assembleDebug

    - name: Upload Debug APK
      uses: actions/upload-artifact@v4
      with:
        name: debug-apk
        path: frontend/android/app/build/outputs/apk/debug/app-debug.apk
