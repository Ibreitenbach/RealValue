# Name of the workflow
name: Android APK Build and Upload

# Controls when the workflow will run
on:
  # Triggers the workflow on push events but only for the main branch
  push:
    branches:
      - main
  # Triggers the workflow on pull request events but only for the main branch
  pull_request:
    branches:
      - main

# A workflow run is made up of one or more jobs that can run sequentially or in parallel
jobs:
  build_android_apk:
    # The type of runner that the job will run on
    runs-on: ubuntu-latest

    # Steps represent a sequence of tasks that will be executed as part of the job
    steps:
      # Step 1: Checks-out your repository under $GITHUB_WORKSPACE, so your job can access it
      - name: Checkout Repository
        uses: actions/checkout@v4

      # Step 2: Set up Node.js environment
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          # --- CONFIGURATION ---
          # Specify the Node.js version to use.
          node-version: 18
          # --- OPTIMIZATION ---
          # Enable caching for Yarn. This significantly speeds up builds by restoring
          # dependencies from a cache instead of downloading them every time.
          cache: 'yarn'
          # --- CORRECTION ---
          # The path to the yarn.lock file. It's crucial that 'frontend/yarn.lock' is
          # committed to your repository for caching to work correctly.
          # The previous error showed this path couldn't be found, which is the
          # primary reason for the failure.
          cache-dependency-path: 'frontend/yarn.lock'

      # Step 3: Install JavaScript dependencies using Yarn
      - name: Install JavaScript Dependencies
        # --- BEST PRACTICE ---
        # Set the working directory for this step to your 'frontend' folder.
        working-directory: frontend
        # --- CORRECTION & BEST PRACTICE ---
        # Use 'yarn install --frozen-lockfile'.
        # --frozen-lockfile is a critical best practice for CI/CD. It ensures that
        # Yarn installs the exact versions of dependencies specified in your
        # 'yarn.lock' file and will fail if the yarn.lock file is out of sync with
        # package.json. This guarantees reproducible builds.
        # This requires 'frontend/yarn.lock' to be committed to your repository.
        run: yarn install --frozen-lockfile

      # Step 4: Set up Java Development Kit (JDK)
      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          # Use the Temurin distribution of OpenJDK
          distribution: 'temurin'
          # Set the Java version required for your Android build
          java-version: '17'
          # --- OPTIMIZATION ---
          # Enable caching for Gradle dependencies to speed up the build process.
          cache: 'gradle'

      # Step 5: Grant execute permissions to the Gradle wrapper script
      # This is necessary because file permissions are not always preserved in git.
      - name: Grant Execute Permissions for gradlew
        run: chmod +x frontend/android/gradlew

      # Step 6: Build the Android Release APK
      - name: Build Android Release APK
        # Set the working directory to the 'android' subfolder within 'frontend'
        working-directory: frontend/android
        # --- BEST PRACTICE ---
        # Run 'clean' to remove any previous build outputs and then 'assembleRelease'
        # to build the unsigned release APK.
        run: ./gradlew clean assembleRelease

      # Step 7: Upload the generated APK as a build artifact
      - name: Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          # The name of the artifact to be uploaded.
          name: app-release-apk
          # The path to the file to upload. This is the standard output path for a release APK.
          path: frontend/android/app/build/outputs/apk/release/app-release.apk
          # Optional: Set the number of days to retain the artifact.
          retention-days: 7
