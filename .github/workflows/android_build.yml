name: Android APK Build

on:
  push:
    branches:
      - main # Trigger on pushes to the main branch
  workflow_dispatch: # Allows manual triggering from the GitHub Actions tab

jobs:
  build_android:
    runs-on: ubuntu-latest # Use a fresh Ubuntu environment provided by GitHub

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20' # Use a modern stable Node.js version, like 20 or 22
        cache: 'npm' # Cache npm dependencies

    - name: Install Frontend (React Native) Dependencies
      run: cd frontend && npm install # Correctly navigates to frontend for npm install

    - name: Clean Android build cache (React Native specific)
      # Cleans the Android build directories to ensure fresh linking
      run: |
        cd frontend/android
        ./gradlew clean --project-dir .

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
        cache: 'gradle' # Cache Gradle dependencies for faster builds

    - name: Grant execute permission to gradlew
      run: chmod +x frontend/android/gradlew

    - name: Verify gradlew existence and permissions
      run: ls -l frontend/android/gradlew # Diagnostic step

    - name: Remove problematic org.gradle.java.home if present
      run: |
            # Check for gradle.properties at project root and remove/comment out org.gradle.java.home
            if [ -f gradle.properties ]; then
              sed -i '/^org\.gradle\.java\.home=/d' gradle.properties
            fi
            # Check for gradle.properties in frontend/android directory and remove/comment out org.gradle.java.home
            if [ -f frontend/android/gradle.properties ]; then
              sed -i '/^org\.gradle\.java\.home=/d' frontend/android/gradle.properties # Corrected path here
            fi
            echo "Attempted to remove org.gradle.java.home from gradle.properties files."

    - name: Bundle React Native Assets (Optional, often done by Gradle)
      # This step explicitly bundles JS assets, sometimes required if Gradle doesn't trigger it automatically
      # Note: This might not be strictly necessary if assembleDebug triggers bundling internally.
      # We will enable this if the build still fails after the initial clean and standard build attempt.
      run: |
        echo "Skipping explicit JS bundling for now, let Gradle handle it."
        # If needed, uncomment the following line and adjust path:
        # cd frontend && npx react-native bundle --platform android --dev false --entry-file index.js --bundle-output android/app/src/main/assets/index.android.bundle --assets-dest android/app/src/main/res
      # This step is commented out to allow assembleDebug to try its default bundling first.

    - name: Build Debug APK
      # Gradle will now attempt to pick up React Native libraries after npm install
      run: ./frontend/android/gradlew assembleDebug --project-dir frontend/android

    - name: Upload Debug APK
      uses: actions/upload-artifact@v4
      with:
        name: debug-apk
        path: frontend/android/app/build/outputs/apk/debug/app-debug.apk
