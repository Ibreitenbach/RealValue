name: Android CI Build

on:
  push:
    branches:
      - main # Trigger on pushes to the main branch
  workflow_dispatch: # Allows manual triggering from the GitHub Actions tab

jobs:
  build:
    runs-on: ubuntu-latest # Use a fresh Ubuntu environment provided by GitHub

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
        cache: 'gradle' # Cache Gradle dependencies for faster builds

    - name: Grant execute permission to gradlew
      run: chmod +x frontend/android/gradlew

    - name: Build Debug APK
      run: ./frontend/android/gradlew assembleDebug
      env:
        # Add any necessary environment variables for your build here, if any
        # For example, if your build needs ANDROID_SDK_ROOT set specifically:
        # ANDROID_SDK_ROOT: ${{ github.workspace }}/.android/sdk
        # However, for most projects, setup-java and gradlew handle SDK location.
        # This project likely handles SDK location fine without explicit setting here, as you have gradlew.
        # So, no extra env vars are likely needed here.
        # If build fails, we might need to revisit this.

    - name: Upload Debug APK
      uses: actions/upload-artifact@v4
      with:
        name: debug-apk
        path: frontend/android/app/build/outputs/apk/debug/app-debug.apk # Adjust path if your APK is elsewhere
