name: Android APK Build

on:
  push:
    branches:
      - main # Trigger on pushes to the main branch
  workflow_dispatch: # Allows manual triggering from the GitHub Actions tab

jobs:
  build_android:
    runs-on: ubuntu-latest # Use a fresh Ubuntu environment provided by GitHub

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
        cache: 'gradle' # Cache Gradle dependencies for faster builds

    - name: Grant execute permission to gradlew
      run: chmod +x frontend/android/gradlew

    - name: Verify gradlew existence and permissions
      run: ls -l frontend/android/gradlew # Diagnostic step

    - name: Build Debug APK
      run: ./frontend/android/gradlew assembleDebug --project-dir frontend/android

    - name: Upload Debug APK
      uses: actions/upload-artifact@v4
      with:
        name: debug-apk
        path: frontend/android/app/build/outputs/apk/debug/app-debug.apk
