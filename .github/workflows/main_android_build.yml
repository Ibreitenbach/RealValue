name: React Native Android APK Build

on:
  push:
    branches:
      - main # Trigger on pushes to the main branch
  workflow_dispatch: # Allows manual triggering from the GitHub Actions tab

jobs:
  build_android:
    runs-on: ubuntu-latest # Use a fresh Ubuntu environment provided by GitHub

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20' # Use a modern stable Node.js version, like 20 or 22
        cache: 'yarn' # Cache yarn dependencies
        cache-dependency-path: frontend/yarn.lock # Explicitly tell where yarn.lock is for caching

    - name: Install Frontend (React Native) Dependencies
      # Aggressively remove node_modules and yarn.lock, then clean Yarn cache and reinstall
      run: |
        cd frontend
        rm -rf node_modules yarn.lock # Remove node_modules and yarn.lock
        npm cache clean --force # Still good to clean npm cache just in case
        yarn cache clean --all # Clean yarn cache
        yarn install --frozen-lockfile # Use yarn to install, --frozen-lockfile ensures reproducibility
      env:
        NODE_PATH: ./node_modules # Explicitly set NODE_PATH for resolution

    - name: Clean Android build cache
      # Cleans the Android build directories to ensure fresh linking
      run: |
        cd frontend/android
        bash ./gradlew clean --project-dir .

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
        cache: 'gradle' # Cache Gradle dependencies for faster builds

    - name: Grant execute permission to gradlew
      # Use a more aggressive chmod to ensure execute permissions for all
      run: chmod 777 frontend/android/gradlew

    - name: Verify gradlew file type and permissions
      # Displays file type (e.g., "Bourne-Again shell script") and permissions
      run: |
        file frontend/android/gradlew
        ls -l frontend/android/gradlew

    - name: Remove problematic org.gradle.java.home if present
      run: |
            # Check for gradle.properties at project root and remove/comment out org.gradle.java.home
            if [ -f gradle.properties ]; then
              sed -i '/^org\.gradle\.java\.home=/d' gradle.properties
            fi
            # Check for gradle.properties in frontend/android directory and remove/comment out org.gradle.java.home
            if [ -f frontend/android/gradle.properties ]; then
              sed -i '/^org\.gradle\.java\.home=/d' frontend/android/gradle.properties
            fi
            echo "Attempted to remove org.gradle.java.home from gradle.properties files."

    - name: Bundle React Native Assets
      # This step explicitly bundles JS assets into the Android project's assets folder
      run: |
        cd frontend
        yarn react-native bundle --platform android --dev false --entry-file index.js --bundle-output android/app/src/main/assets/index.android.bundle --assets-dest android/app/src/main/res
      env:
        NODE_PATH: ./node_modules # Re-set NODE_PATH for this step as well

    - name: Build Debug APK
      # Gradle will now attempt to pick up React Native libraries after npm install and bundling
      run: |
        cd frontend/android
        bash ./gradlew assembleDebug \
          -DreactNativeDebug=true \
          -Dvariant=debug \
          -DreactNativeAndroidRoot=../ \
          -Dgradle.properties.exclude=org.gradle.java.home \
          --stacktrace --info

    - name: Upload Debug APK
      uses: actions/upload-artifact@v4
      with:
        name: debug-apk
        path: frontend/android/app/build/outputs/apk/debug/app-debug.apk
