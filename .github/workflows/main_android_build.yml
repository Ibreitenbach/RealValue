name: React Native Android APK Build

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build_android:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'
        cache: 'npm'

    - name: Install Frontend (React Native) Dependencies
      # Set NODE_PATH to explicitly include node_modules for resolution
      # Aggressively remove node_modules and package-lock.json for a clean install
      run: |
        cd frontend
        rm -rf node_modules package-lock.json
        npm cache clean --force
        npm install --force
      env:
        NODE_PATH: ./node_modules # Explicitly set NODE_PATH relative to frontend/

    - name: Clean Android build cache
      run: |
        cd frontend/android
        bash ./gradlew clean --project-dir .

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
        cache: 'gradle'

    - name: Grant execute permission to gradlew
      run: chmod 777 frontend/android/gradlew

    - name: Verify gradlew file type and permissions
      run: |
        file frontend/android/gradlew
        ls -l frontend/android/gradlew

    - name: Remove problematic org.gradle.java.home if present
      run: |
            if [ -f gradle.properties ]; then
              sed -i '/^org\.gradle\.java\.home=/d' gradle.properties
            fi
            if [ -f frontend/android/gradle.properties ]; then
              sed -i '/^org\.gradle\.java\.home=/d' frontend/android/gradle.properties
            fi
            echo "Attempted to remove org.gradle.java.home from gradle.properties files."

    - name: Bundle React Native Assets
      # Explicitly bundle JS assets into the Android project's assets folder
      # Ensure npx command uses absolute paths or is run from the correct directory
      run: |
        cd frontend
        # Running from node_modules/.bin to be explicit about npx path
        ./node_modules/.bin/react-native bundle --platform android --dev false --entry-file index.js --bundle-output android/app/src/main/assets/index.android.bundle --assets-dest android/app/src/main/res
      env:
        # Re-set NODE_PATH for this step as well, or ensure it's inherited from job level
        NODE_PATH: ./node_modules

    - name: Build Debug APK
      run: |
        cd frontend/android
        bash ./gradlew assembleDebug \
          -DreactNativeDebug=true \
          -Dvariant=debug \
          -DreactNativeAndroidRoot=../ \
          -Dgradle.properties.exclude=org.gradle.java.home \
          --stacktrace --info

    - name: Upload Debug APK
      uses: actions/upload-artifact@v4
      with:
        name: debug-apk
        path: frontend/android/app/build/outputs/apk/debug/app-debug.apk
