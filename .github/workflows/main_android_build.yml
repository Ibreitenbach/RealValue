name: React Native Android APK Build

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build_android:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Node.js (using Node 18 LTS for broader compatibility)
      uses: actions/setup-node@v4
      with:
        node-version: '18' # Changed to Node.js 18 (LTS)
        cache: 'yarn'
        cache-dependency-path: frontend/yarn.lock

    - name: Aggressive Clean Node Modules & Install with Yarn
      # Perform an even deeper clean of node_modules and reinstall
      run: |
        cd frontend
        # Remove all node_modules related caches and yarn artifacts
        rm -rf node_modules yarn.lock .yarn .pnp.cjs .pnp.js .pnp.*
        yarn cache clean --all # Clear global Yarn cache
        yarn install --frozen-lockfile # Reinstall dependencies
      env:
        # Explicitly set NODE_PATH for resolution, even with current directory
        NODE_PATH: ./node_modules

    - name: Clean Android build cache
      run: |
        cd frontend/android
        bash ./gradlew clean --project-dir .

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
        cache: 'gradle'

    - name: Grant execute permission to gradlew
      run: chmod 777 frontend/android/gradlew

    - name: Verify gradlew file type and permissions
      run: |
        file frontend/android/gradlew
        ls -l frontend/android/gradlew

    - name: Remove problematic org.gradle.java.home if present
      run: |
            if [ -f gradle.properties ]; then
              sed -i '/^org\.gradle\.java\.home=/d' gradle.properties
            fi
            if [ -f frontend/android/gradle.properties ]; then
              sed -i '/^org\.gradle\.java\.home=/d' frontend/android/gradle.properties
            fi
            echo "Attempted to remove org.gradle.java.home from gradle.properties files."

    - name: Bundle React Native Assets
      run: |
        cd frontend
        yarn react-native bundle \
          --platform android \
          --dev false \
          --entry-file index.js \
          --bundle-output android/app/src/main/assets/index.android.bundle \
          --assets-dest android/app/src/main/res
      env:
        NODE_PATH: ./node_modules # Ensure NODE_PATH is set for this step
        # Sometimes needed for Metro to find assets in CI/headless environments
        REACT_NATIVE_PACKAGER_HOSTNAME: localhost

    - name: Build Debug APK
      run: |
        cd frontend/android
        bash ./gradlew assembleDebug \
          -DreactNativeDebug=true \
          -Dvariant=debug \
          -DreactNativeAndroidRoot=../ \
          -Dgradle.properties.exclude=org.gradle.java.home \
          --stacktrace --info

    - name: Upload Debug APK
      uses: actions/upload-artifact@v4
      with:
        name: debug-apk
        path: frontend/android/app/build/outputs/apk/debug/app-debug.apk
