# Name of the workflow
name: Android APK Build and Upload

# Controls when the workflow will run
on:
  # Triggers the workflow on push events but only for the main branch
  push:
    branches:
      - main
  # Triggers the workflow on pull request events but only for the main branch
  pull_request:
    branches:
      - main

# A workflow run is made up of one or more jobs that can run sequentially or in parallel
jobs:
  build_android_apk:
    # The type of runner that the job will run on
    runs-on: ubuntu-latest

    # Steps represent a sequence of tasks that will be executed as part of the job
    steps:
      # Step 1: Checks-out your repository under $GITHUB_WORKSPACE, so your job can access it
      - name: Checkout Repository
        uses: actions/checkout@v4

      # Step 2: Verify that yarn.lock exists before trying to cache or install.
      # The caching mechanism in the next step depends on this file. For reproducible
      # builds, yarn.lock should be committed to your repository.
      - name: Verify yarn.lock exists
        run: |
          if [[ ! -f "frontend/yarn.lock" ]]; then
            echo "::error file=frontend/package.json::'frontend/yarn.lock' not found."
            echo "::error file=frontend/package.json::Please run 'yarn install' in your 'frontend' directory locally and commit the generated 'yarn.lock' file to your repository."
            exit 1
          fi

      # Step 3: Set up Node.js environment and cache dependencies
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          # --- CONFIGURATION ---
          # Specify the Node.js version to use.
          node-version: 18
          # --- OPTIMIZATION ---
          # Enable caching for Yarn. This significantly speeds up builds by restoring
          # dependencies from a cache instead of downloading them every time.
          # This step uses the hash of 'frontend/yarn.lock' as the cache key.
          cache: 'yarn'
          cache-dependency-path: 'frontend/yarn.lock'

      # Step 4: Install JavaScript dependencies using Yarn
      - name: Install JavaScript Dependencies
        # --- BEST PRACTICE ---
        # Set the working directory for this step to your 'frontend' folder.
        working-directory: frontend
        # --- CORRECTION & BEST PRACTICE ---
        # Use 'yarn install --frozen-lockfile'.
        # This is a critical best practice for CI/CD. It ensures that
        # Yarn installs the exact versions of dependencies specified in your
        # 'yarn.lock' file and will fail if the yarn.lock file is out of sync with
        # package.json. This guarantees reproducible builds.
        run: yarn install --frozen-lockfile

      # Step 5: Set up Java Development Kit (JDK)
      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          # Use the Temurin distribution of OpenJDK
          distribution: 'temurin'
          # Set the Java version required for your Android build
          java-version: '17'
          # --- OPTIMIZATION ---
          # Enable caching for Gradle dependencies to speed up the build process.
          cache: 'gradle'

      # Step 6: Grant execute permissions to the Gradle wrapper script
      # This is necessary because file permissions are not always preserved in git.
      - name: Grant Execute Permissions for gradlew
        run: chmod +x frontend/android/gradlew

      # Step 7: Build the Android Release APK
      - name: Build Android Release APK
        # Set the working directory to the 'android' subfolder within 'frontend'
        working-directory: frontend/android
        # --- BEST PRACTICE ---
        # Run 'clean' to remove any previous build outputs and then 'assembleRelease'
        # to build the unsigned release APK.
        run: ./gradlew clean assembleRelease

      # --- NEW DEBUGGING STEP ---
      # Step 8: List files in the build outputs directory to find the APK
      # This will help us confirm the exact path and filename of the generated APK
      # in case it differs from the standard 'app-release.apk'.
      - name: List Build Output Files
        run: ls -R frontend/android/app/build/outputs/apk

      # Step 9: Upload the generated APK as a build artifact
      - name: Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          # The name of the artifact to be uploaded.
          name: app-release-apk
          # The path to the file to upload. This is the standard output path for a release APK.
          path: frontend/android/app/build/outputs/apk/release/app-release.apk
          # Optional: Set the number of days to retain the artifact.
          retention-days: 7
